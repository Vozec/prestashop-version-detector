id: prestashop-detect

info:
  name: PrestaShop Detection (headless-aware)
  author: arthursd444
  severity: info
  description: |
    Detects PrestaShop installs including heavily-reskinned / headless storefronts
    (custom React/Vue front-ends where the classic theme + meta generator are stripped).
    Keys on runtime plumbing that survives a reskin: the webservice Basic-auth realm,
    the PrestaShop-<md5> session cookie, the PS-generated robots.txt, and the
    window.prestashop JS global.
  reference:
    - https://github.com/PrestaShop/PrestaShop
  classification:
    cpe: cpe:2.3:a:prestashop:prestashop:*:*:*:*:*:*:*:*
  metadata:
    verified: true
    max-request: 3
    vendor: prestashop
    product: prestashop
    shodan-query: http.component:"PrestaShop"
  tags: tech,prestashop,ecommerce

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/api/"
      - "{{BaseURL}}/robots.txt"
    stop-at-first-match: true
    redirects: true
    max-redirects: 2

    matchers-condition: or
    matchers:
      # STRONG - webservice REST API Basic-auth realm leaks the literal product name
      - type: word
        name: webservice-realm
        part: header
        words:
          - 'Welcome to PrestaShop Webservice'
          - 'X-Powered-By: PrestaShop Webservice'
        condition: or
        case-insensitive: true

      # STRONG - encrypted session cookie, set on every front-office page
      - type: regex
        name: cookie
        part: header
        regex:
          - '(?i)Set-Cookie:\s*PrestaShop-[a-f0-9]{32}'

      # STRONG - PrestaShop-generated robots.txt banner
      - type: word
        name: robots-banner
        part: body
        words:
          - 'automatically generated by PrestaShop'
        case-insensitive: true

      # STRONG - front-controller JS global (PS 1.7+), survives custom themes
      - type: word
        name: js-global
        part: body
        words:
          - 'var prestashop ='
          - 'window.prestashop'
          - 'prestashop = {'
        condition: or

      # MEDIUM - classic-theme meta generator (only un-stripped installs)
      - type: word
        name: meta-generator
        part: body
        words:
          - '<meta name="generator" content="PrestaShop'
        case-insensitive: true

      # MEDIUM - robots.txt discloses the full PS directory map (AND = low FP)
      - type: word
        name: robots-paths
        part: body
        words:
          - 'Disallow: /*controller=authentication'
          - 'Disallow: /classes/'
          - 'Disallow: /webservice/'
        condition: and

    extractors:
      - type: kval
        name: ps-cookie
        kval:
          - set_cookie
      - type: regex
        name: ws-version
        part: header
        group: 1
        regex:
          - 'PSWS-Version:\s*([0-9.]+)'
