id: prestashop-fast

info:
  name: PrestaShop Fast Detection (near one-shot)
  author: arthursd444
  severity: info
  description: |
    Near one-shot PrestaShop detection. Primary signal is the default static
    error500.html, whose <meta description> literally reads "This store is
    powered by PrestaShop" on every release 1.6.1 -> 9.1.4 - it survives custom
    themes, headless front-ends and hardened .htaccess. Fallback signals (api
    realm, session cookie, robots banner, JS global) cover edge cases.
    stop-at-first-match exits on the first hit, so most targets resolve in 1 GET.
  reference:
    - https://github.com/PrestaShop/PrestaShop
  classification:
    cpe: cpe:2.3:a:prestashop:prestashop:*:*:*:*:*:*:*:*
  metadata:
    verified: true
    max-request: 4
    vendor: prestashop
    product: prestashop
    shodan-query: http.component:"PrestaShop"
  tags: tech,prestashop,ecommerce

http:
  - method: GET
    stop-at-first-match: true
    redirects: true
    max-redirects: 2
    path:
      - "{{BaseURL}}/error500.html"
      - "{{BaseURL}}/api/"
      - "{{BaseURL}}/"
      - "{{BaseURL}}/robots.txt"

    matchers-condition: or
    matchers:
      # PRIMARY - default error500.html (static, every version, one-shot)
      - type: word
        name: error500
        part: body
        words:
          - 'This store is powered by PrestaShop'
        case-insensitive: true

      # webservice REST API realm - product name in an HTTP header
      - type: word
        name: webservice-realm
        part: header
        words:
          - 'Welcome to PrestaShop Webservice'
        case-insensitive: true

      # encrypted session cookie
      - type: regex
        name: cookie
        part: header
        regex:
          - '(?i)Set-Cookie:\s*PrestaShop-[a-f0-9]{32}'

      # PrestaShop-generated robots.txt banner
      - type: word
        name: robots
        part: body
        words:
          - 'automatically generated by PrestaShop'
        case-insensitive: true

      # front-controller JS global
      - type: word
        name: js-global
        part: body
        words:
          - 'var prestashop ='
          - 'window.prestashop'
        condition: or
